# Bot_Wynncraft — bot de Discord (guilda WynnCraft). Conecta pra fora (Discord +
# API WynnCraft) e expõe modpack.battomic.com só para o download do modpack (o
# servidor HTTP interno serve /health e /modpack em :8080). Buildado do repo pelo
# Dokploy (projeto "outros", branch main). bot-mongo dedicado e isolado em
# net-bot-data; egress + entrada do Traefik via dokploy-network.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Discord (obrigatórios) — copie do seu .env local
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      # MongoDB (obrigatório) — aponta pro bot-mongo abaixo
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      # WynnCraft — informe ao menos o prefixo OU o UUID da guilda
      WYNN_GUILD_PREFIX: ${WYNN_GUILD_PREFIX}
      WYNN_GUILD_UUID: ${WYNN_GUILD_UUID}
      WYNN_API_KEY: ${WYNN_API_KEY}
      PORT: 8080
      # Domínio público do /modpack. Defina PUBLIC_URL na aba Environment do
      # Dokploy (= o Host das labels abaixo, com https).
      PUBLIC_URL: ${PUBLIC_URL}
    networks:
      - net-bot-data
      - dokploy-network
    # Traefik: expõe SÓ o HTTP interno (:8080) em modpack.battomic.com para o
    # download do modpack. Mesmo padrão de churras/sr. O /health também responde
    # aí, mas o healthcheck do Dokploy segue interno.
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.wynn-modpack.rule=Host(`modpack.battomic.com`)
      - traefik.http.routers.wynn-modpack.entrypoints=websecure
      - traefik.http.routers.wynn-modpack.tls=true
      - traefik.http.routers.wynn-modpack.tls.certresolver=letsencrypt
      - traefik.http.routers.wynn-modpack.service=wynn-modpack
      - traefik.http.services.wynn-modpack.loadbalancer.server.port=8080

  bot-mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${BOT_MONGO_ROOT_PASSWORD}
    volumes:
      - vol-bot-mongo:/data/db
    networks:
      - net-bot-data

volumes:
  vol-bot-mongo:

networks:
  net-bot-data:
    external: true
  dokploy-network:
    external: true
